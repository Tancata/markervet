# =============================================================================
# MarkerVet conda/mamba environment
# -----------------------------------------------------------------------------
#   mamba env create -f envs/markervet.yaml
#   conda activate markervet
#
# Or let Snakemake manage it per-rule:
#   snakemake --use-conda --conda-frontend mamba ...
#
# Pins are intentionally loose (>=) so the scaffold resolves on current
# bioconda; tighten them for a reproducible production run.
#
# NOTE (macOS / Apple Silicon): a few packages are handled outside this file:
#   * PhylteR   -> the R package is CRAN-only (there is no `r-phylter` conda
#                  package). Install it after the env is created:
#                      Rscript -e 'install.packages("phylter", repos="https://cloud.r-project.org")'
#   * AleRax    -> reconciliation tool; bioconda ships it for linux-64 only.
#                  On osx-arm64 build from source, or run reconciliation on
#                  Linux/HPC. Reconciliation is OFF by default in the presets
#                  (outliers_hgt.reconciliation.enabled: false) until wired up.
# =============================================================================
name: markervet
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # --- workflow engine ------------------------------------------------------
  - snakemake-minimal>=7.32

  # --- alignment / trimming -------------------------------------------------
  - mafft>=7.520
  - clipkit>=2.1
  - bmge>=1.12

  # --- tree inference / HMM search / rogue tips -----------------------------
  - iqtree>=3            # provides `iqtree3` (pipeline calls iqtree3)
  - hmmer>=3.3           # provides `hmmsearch`
  - treeshrink>=1.3      # provides `run_treeshrink.py`

  # --- coalescent supertree -------------------------------------------------
  - aster>=1.19          # provides `astral` (ASTRAL-IV), `wastral`, `astral-pro`

  # --- reconciliation (HGT localisation) ------------------------------------
  # AleRax is the intended reconciliation tool but is not on bioconda for
  # osx-arm64 (linux-64 only). It is installed/built separately; see the note
  # at the top of this file. Reconciliation is disabled in the presets for now.

  # --- Python stack for the pure-Python screens -----------------------------
  - python>=3.9,<3.13    # <3.13 keeps ete3 happy
  - numpy>=1.21
  - scipy>=1.7
  - pyyaml>=6.0
  - dendropy>=4.5
  - ete3>=3.1
  - pandas>=1.3          # convenience for downstream analysis of the scorecard

  # --- R stack for PhylteR ---------------------------------------------------
  # r-phylter is NOT a conda package: install `phylter` from CRAN post-hoc
  # (see the note at the top of this file).
  - r-base>=4.1
  - r-ape>=5.6
  - r-optparse>=1.7
